<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luke Pale Wellbeing Escalation Simulation</title>
  <link rel="stylesheet" href="./styles.css?v=3" />
</head>
<body>
  <div class="page">
    <main class="app-shell">
      <header class="topbar">
        <div class="topline">
          <div class="uos-logo">UoS</div>
          <div class="app-title" id="appTitle">MSFT Mail</div>
          <div class="search-wrap" id="searchWrap">
            <span class="search-icon">⌕</span>
            <input id="searchInput" placeholder="Search..." />
          </div>
          <button id="topNewMail" class="btn btn-primary">＋ New Mail</button>
          <button id="helpButton" class="btn">? Help</button>
        </div>
        <nav class="navline"><span>File</span><span class="active">Home</span><span>View</span><span>Help</span></nav>
      </header>
      <section id="mainGrid" class="main-grid"></section>
    </main>
  </div>
  <footer class="desktop-bar">
    <div class="desktop-inner">
      <div class="desktop-left"><span>🖥️</span><div class="desktop-search">⌕ Search</div></div>
      <div class="desktop-centre"><button id="taskNav" class="task-btn secondary">⇄ Order task</button><button id="mailNav" class="task-btn">✉ Mail</button></div>
      <div class="desktop-right"><span>⏻</span><span>⌃</span><span>▭</span><span>⌁</span><span>🖨️</span><div id="clock" class="clock"></div></div>
    </div>
  </footer>
  <div id="modalRoot"></div>
  <div id="timeOverlay" class="time-overlay hidden"><div class="big-clock" id="bigClock"></div></div>
  <div id="toast" class="toast hidden"></div>
  <script src="./data.js?v=3"></script>
  <script src="./helpers.js?v=3"></script>
  <script src="./app.js?v=3"></script>
</body>
</html>
